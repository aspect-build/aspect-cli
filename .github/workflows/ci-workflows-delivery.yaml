name: CI - Delivery
# Runs as its own workflow run so the Aspect PR-summary comment exercises
# merging tasks across separate workflows. Normally dispatched by
# ci-workflows.yaml's `dispatch-delivery` job right after `pre-build`
# completes (passing `prebuild_run_id` so we reuse the just-built CLI), but
# also independently runnable via the GitHub UI / `gh workflow run`.
on:
  workflow_dispatch:
    inputs:
      force_targets:
        description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
        required: false
        default: ""
      prebuild_run_id:
        description: "Workflow run id holding the prebuilt `aspect-cli` artifact (set by ci-workflows.yaml). Leave empty to build the CLI from source via bootstrap.sh."
        required: false
        default: ""
      pr_number:
        description: "Triggering PR number (set by ci-workflows.yaml). Restores PR association lost across the workflow_dispatch boundary — surfaced as ASPECT_GITHUB_PR_NUMBER. Empty for a non-PR (push) trigger."
        required: false
        default: ""
      head_sha:
        description: "Triggering PR head commit SHA (set by ci-workflows.yaml). Exported as GITHUB_SHA so the check-run attaches to the PR head commit. Empty for a non-PR (push) trigger."
        required: false
        default: ""
permissions:
  id-token: write
  actions: read # download-artifact needs this to read another run's artifact
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
# The Dash0 OTLP endpoint and bearer token feed `.aspect/config.axl`'s `ctx.telemetry.exporters.add(...)`
# call, which dogfoods the trace.event/trace.log pipeline against a real backend.
# Both are no-ops if a secret isn't configured (unset env var = empty string,
# config.axl skips registration).
env:
  DASH0_ENDPOINT: ${{ secrets.DASH0_ENDPOINT }}
  DASH0_TOKEN: ${{ secrets.DASH0_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Reconstruct the PR context that the workflow_dispatch boundary dropped, so
  # `aspect delivery`'s GithubStatusChecks posts a check-run on the PR head and
  # the Aspect PR-summary comment can associate (and merge) delivery's tasks.
  # `ASPECT_GITHUB_PR_NUMBER` is github.axl's documented detect_pr override.
  # When dispatched on a push (no PR), pr_number is empty and GITHUB_SHA falls
  # back to the runner-provided value so branch runs are unaffected.
  ASPECT_GITHUB_PR_NUMBER: ${{ inputs.pr_number }}
  GITHUB_SHA: ${{ inputs.head_sha != '' && inputs.head_sha || github.sha }}
jobs:
  delivery-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    timeout-minutes: 10
    env:
      ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS: ${{ inputs.force_targets }}
    steps:
      - uses: actions/checkout@v6
      # When dispatched by ci-workflows.yaml, reuse the CLI that run's
      # pre-build already built (cross-run artifact download). On a bare
      # manual dispatch there's no upstream run, so build from source.
      - uses: ./.github/actions/install-prebuilt-aspect-cli
        if: inputs.prebuild_run_id != ''
        with:
          run-id: ${{ inputs.prebuild_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bootstrap
        if: inputs.prebuild_run_id == ''
        run: .aspect/bootstrap.sh
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Delivery Task
        # --force-target re-delivers every run so the manifest always
        # carries at least one `ok` outcome to exercise the per-target
        # enrichment hook in //.aspect/config.axl. Additional force
        # targets (via the workflow_dispatch input or the
        # ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS env var) merge in.
        # --warn-unresolved-digest: this deliverable set includes py_deliverable,
        # a stamped py_binary whose PyWriteBuildData action is uncacheable and so
        # never resolves a digest — a known, tolerated missing digest here, so
        # keep it a warning rather than the (new) default hard failure.
        run: aspect delivery --task:name delivery-gha --warn-not-runnable --warn-unresolved-digest --force-target=//examples/deliverable:deliverable_with_digest
  delivery-debug-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    timeout-minutes: 10
    env:
      ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS: ${{ inputs.force_targets }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
        if: inputs.prebuild_run_id != ''
        with:
          run-id: ${{ inputs.prebuild_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bootstrap
        if: inputs.prebuild_run_id == ''
        run: .aspect/bootstrap.sh
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Delivery Task (ASPECT_DEBUG=1)
        # --warn-unresolved-digest for the same reason as delivery-gha: the
        # deliverable set includes the stamped, uncacheable py_deliverable.
        run: ASPECT_DEBUG=1 aspect delivery --task:name delivery-gha-debug --warn-unresolved-digest --force-target=//examples/deliverable:deliverable_with_digest
  # Regression guard for the silent-warn bug where an unhashable deliverable
  # passed green and was never delivered. //examples/deliverable:py_deliverable
  # is a stamped py_binary whose PyWriteBuildData action is uncacheable, so it
  # never resolves a change-detection digest. Delivery must HARD-FAIL by default
  # — naming the culprit target + action and the fix — and DOWNGRADE to a
  # warning (exit 0) under --warn-unresolved-digest. (The default delivery query
  # `attr(tags, deliverable, //...)` from config.axl takes precedence over
  # positional targets, so we assert against this in-tree deliverable rather
  # than a bespoke target the query would skip.)
  delivery-uncacheable-digest-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
        if: inputs.prebuild_run_id != ''
        with:
          run-id: ${{ inputs.prebuild_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bootstrap
        if: inputs.prebuild_run_id == ''
        run: .aspect/bootstrap.sh
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Delivery unresolvable-digest must hard-fail
        run: |
          set -uo pipefail
          # This job deliberately makes delivery fail, so suppress its GitHub
          # check run — a red "aspect / delivery-uncacheable" check on the PR
          # would be noise, not a real signal.
          common="--track-state=false --mode=always --dry-run --github-status-checks:enabled=false"

          echo "== Expect HARD FAILURE (default: no --warn-unresolved-digest) =="
          out="$(aspect delivery --task:name delivery-uncacheable $common 2>&1)" && code=0 || code=$?
          echo "$out"
          if [ "$code" -eq 0 ]; then
            echo "::error::delivery succeeded but must hard-fail when a digest can't be resolved"; exit 1
          fi
          echo "$out" | grep -q "py_deliverable" \
            || { echo "::error::failure did not name the uncacheable target py_deliverable"; exit 1; }
          echo "$out" | grep -q "PyWriteBuildData" \
            || { echo "::error::failure did not name the uncacheable action PyWriteBuildData"; exit 1; }
          echo "$out" | grep -Eq "no-remote|local" \
            || { echo "::error::failure did not surface the no-remote / local remediation"; exit 1; }

          echo "== Expect WARNING downgrade (exit 0) with --warn-unresolved-digest =="
          aspect delivery --task:name delivery-uncacheable-warn --warn-unresolved-digest $common
