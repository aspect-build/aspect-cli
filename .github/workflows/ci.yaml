name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_targets:
        description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
        required: false
        default: ""

permissions:
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  pre-build:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    steps:
      - uses: actions/checkout@v6
      - name: Pre-build CLI
        run: |
          echo "Build and upload CLI to remote cache"
          .aspect/bootstrap.sh

  build-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Build Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect build --task-key build-gha-debug //...
      - name: Build Task
        run: aspect build --task-key build-gha //...

  test-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Test Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect test --task-key test-gha-debug //...
      - name: Test Task
        run: aspect test --task-key test-gha //...

  lint-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Lint Task (ASPECT_DEBUG=1)
        working-directory: examples/lint
        run: ASPECT_DEBUG=1 aspect lint  --task-key lint-gha-debug --aspect=//:linters.bzl%shellcheck //...
      - name: Lint Task
        working-directory: examples/lint
        run: aspect lint  --task-key lint-gha --aspect=//:linters.bzl%shellcheck //...

  format-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Format Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect format --task-key format-gha-debug
      - name: Format Task
        run: aspect format --task-key format-gha

  gazelle-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Gazelle Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect gazelle --check --task-key gazelle-gha-debug
      - name: Gazelle Task
        run: aspect gazelle --check --task-key gazelle-gha

  gazelle-from-source-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      # Regression test for the build-from-source gazelle path —
      # upstream `gazelle()` macro + rules_go toolchain compiling a
      # bespoke gazelle binary, instead of the prebuilt artifact.
      # `--config=pure_go` is required on Linux: toolchains_llvm_bootstrapped's
      # lld can't accept Go's non-PIC relocations on x86_64.
      - name: Gazelle Task — from-source (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect gazelle --check --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-gha-debug
      - name: Gazelle Task — from-source
        run: aspect gazelle --check --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-gha

  delivery-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
      ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS: ${{ inputs.force_targets }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Delivery Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect delivery --task-key delivery-gha //examples/deliverable
      - name: Delivery Task
        run: aspect delivery --task-key delivery-gha //examples/deliverable
