name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_targets:
        description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
        required: false
        default: ""

permissions:
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Workflow-level env. Per-job env: blocks add their own (e.g. ASPECT_API_TOKEN);
# values defined here are inherited by every step in every job. The Dash0 OTLP
# endpoint and bearer token feed `.aspect/config.axl`'s `ctx.telemetry.exporters.add(...)`
# call, which dogfoods the trace.event/trace.log pipeline against a real backend.
# Both are no-ops if a secret isn't configured (unset env var = empty string,
# config.axl skips registration).
env:
  DASH0_ENDPOINT: ${{ secrets.DASH0_ENDPOINT }}
  DASH0_TOKEN: ${{ secrets.DASH0_TOKEN }}

jobs:
  pre-build:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Pre-build CLI
        run: |
          echo "Build and upload CLI to remote cache"
          .aspect/bootstrap.sh

  build-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Build Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect build --task-key build-gha-debug -- //... -//exclude/...
      - name: Build Task
        run: aspect build --task-key build-gha -- //... -//exclude/...

  test-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Test Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect test --task-key test-gha-debug -- //... -//exclude/...
      - name: Test Task
        run: aspect test --task-key test-gha -- //... -//exclude/...

  lint-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Lint Task (ASPECT_DEBUG=1)
        run: |
          ASPECT_DEBUG=1 aspect lint --task-key lint-gha-debug --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...
          # Revert applied --fix edits before next run. Use git restore (tracked
          # mods only) + git clean -fd (untracked non-ignored files); do NOT use
          # -x because that wipes bazel-out/ and target/ — including the
          # pre-built CLI dropped there by .aspect/bootstrap.sh.
          git restore .
          git clean -fd
      - name: Lint Task
        run: aspect lint --task-key lint-gha --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...

  # Dedicated buildifier-only step that runs in parallel with format-task.
  # Models the legacy Rosetta `buildifier` task using a Starlark-only
  # `format_multirun` target — see https://docs.aspect.build/cli/migration/buildifier.
  buildifier-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Buildifier Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect format --task-key buildifier-gha-debug --formatter-target=//tools/format:format-starlark
      - name: Buildifier Task
        run: aspect format --task-key buildifier-gha --formatter-target=//tools/format:format-starlark

  format-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      # Starlark patterns are handled by buildifier-task; ignore them here so
      # the two steps don't do duplicate work.
      - name: Format Task (ASPECT_DEBUG=1)
        run: |
          ASPECT_DEBUG=1 aspect format --task-key format-gha-debug \
            --ignore-pattern='**/*.axl' \
            --ignore-pattern='**/*.bzl' \
            --ignore-pattern='**/BUILD' \
            --ignore-pattern='**/BUILD.bazel' \
            --ignore-pattern='**/MODULE.bazel' \
            --ignore-pattern='**/WORKSPACE' \
            --ignore-pattern='**/WORKSPACE.bazel'
      - name: Format Task
        run: |
          aspect format --task-key format-gha \
            --ignore-pattern='**/*.axl' \
            --ignore-pattern='**/*.bzl' \
            --ignore-pattern='**/BUILD' \
            --ignore-pattern='**/BUILD.bazel' \
            --ignore-pattern='**/MODULE.bazel' \
            --ignore-pattern='**/WORKSPACE' \
            --ignore-pattern='**/WORKSPACE.bazel'

  gazelle-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Gazelle Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect gazelle --task-key gazelle-gha-debug
      - name: Gazelle Task
        run: aspect gazelle --task-key gazelle-gha

  gazelle-from-source-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      # Regression test for the build-from-source gazelle path —
      # upstream `gazelle()` macro + rules_go toolchain compiling a
      # bespoke gazelle binary, instead of the prebuilt artifact.
      # `--config=pure_go` is required on Linux: toolchains_llvm_bootstrapped's
      # lld can't accept Go's non-PIC relocations on x86_64.
      - name: Gazelle Task — from-source (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-gha-debug
      - name: Gazelle Task — from-source
        run: aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-gha

  delivery-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    env:
      ASPECT_API_TOKEN: ${{ secrets.ASPECT_API_TOKEN }}
      ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS: ${{ inputs.force_targets }}
    steps:
      - uses: actions/checkout@v6
      - name: Bootstrap
        run: .aspect/bootstrap.sh
      - name: Delivery Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect delivery --task-key delivery-gha-debug //examples/deliverable
      - name: Delivery Task
        run: aspect delivery --task-key delivery-gha //examples/deliverable
