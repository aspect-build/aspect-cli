name: axl-api-watch
# Watches the public AXL API surface for drift and pings #aspect-cli when it
# changes (a builtin removed/renamed, a parameter made required, a return type
# changed — the class of break that took down the `rbe` extension). The
# baseline lives in the Actions cache, NOT a committed file: each run compares
# the freshly rendered surface to the surface cached by the previous run, then
# overwrites the cache. Nothing is committed or pushed, so this never opens a
# PR and never lands a commit on main — i.e. it can't trigger prerelease/release
# pipelines. The drift history lives in #aspect-cli.
on:
  push:
    branches: [main]
    # The surface is contributed by many crates (e.g. bazel.RunCommand from
    # crates/bazelrc, std.io.Readable from crates/axl-types), so watch all of
    # them plus the renderer/workflow itself.
    paths:
      - "crates/**"
      - ".github/workflows/axl-api-watch.yml"
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  # Serialize so the cache baseline advances monotonically (no two runs racing
  # to save the same key prefix from different commits).
  group: axl-api-watch
  cancel-in-progress: false
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show
      - name: Dump current API surface
        run: cargo run -q -p axl-docgen -- --api-surface > /tmp/surface.new
      # Restore the most recent previously-cached surface. The exact key
      # (…-<sha>) never exists yet, so this always falls through to the
      # restore-keys prefix and loads the latest prior run's surface.
      - name: Restore previous surface
        uses: actions/cache/restore@v4
        with:
          path: /tmp/surface.prev
          key: axl-api-surface-${{ github.sha }}
          restore-keys: |
            axl-api-surface-
      - name: Diff against previous surface
        id: diff
        run: |
          if [ ! -f /tmp/surface.prev ]; then
            echo "::notice::No cached baseline yet — seeding it; no notification this run."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif diff -u /tmp/surface.prev /tmp/surface.new > /tmp/surface.diff; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Cap the diff so the Slack payload stays well under limits.
            head -c 2500 /tmp/surface.diff > /tmp/surface.slack || true
          fi
      - name: Notify #aspect-cli
        if: steps.diff.outputs.changed == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_API_SURFACE_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_API_SURFACE_WEBHOOK_URL not set; skipping Slack notification"
            exit 0
          fi
          DIFF_BODY="$(cat /tmp/surface.slack 2>/dev/null || echo '(diff unavailable)')"
          jq -n \
            --arg diff "$DIFF_BODY" \
            --arg sha "$GITHUB_SHA" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{
              text: ":rotating_light: axl public API surface changed",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text:
                  ("*axl public API surface changed* in `\($repo)`\n"
                   + "Commit <https://github.com/\($repo)/commit/\($sha)|\($sha[0:7])> · <\($run)|run log>\n"
                   + "Downstream extensions (e.g. `rbe`) may break — review the diff.") } },
                { type: "section", text: { type: "mrkdwn", text: ("```\($diff)```") } }
              ]
            }' \
          | curl -sS -X POST -H 'Content-type: application/json' --data @- "$SLACK_WEBHOOK_URL"
      # Advance the baseline: cache the surface just rendered so the next run
      # diffs against it. Saved under the current SHA's key; the next run finds
      # it via the restore-keys prefix.
      #
      # No `always()` — these inherit the default `success()` guard ON PURPOSE.
      # If the diff or restore step failed, or a drift was detected but the
      # Notify step failed (cache-service outage, webhook/network error), the
      # job is in a failed state and these steps are skipped, so the baseline is
      # NOT advanced. The next run then re-detects the same drift and re-alerts,
      # rather than silently swallowing the break by moving the baseline past an
      # un-notified change. An unchanged run leaves Notify skipped (not failed),
      # so the save still runs and refreshes the cache (resetting its idle
      # eviction timer).
      - name: Save current surface as new baseline
        run: cp /tmp/surface.new /tmp/surface.prev
      - name: Cache new baseline
        uses: actions/cache/save@v4
        with:
          path: /tmp/surface.prev
          key: axl-api-surface-${{ github.sha }}
