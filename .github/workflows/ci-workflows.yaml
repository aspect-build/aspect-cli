name: CI - Workflows
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
# The Dash0 OTLP endpoint and bearer token feed `.aspect/config.axl`'s `ctx.telemetry.exporters.add(...)`
# call, which dogfoods the trace.event/trace.log pipeline against a real backend.
# Both are no-ops if a secret isn't configured (unset env var = empty string,
# config.axl skips registration).
env:
  DASH0_ENDPOINT: ${{ secrets.DASH0_ENDPOINT }}
  DASH0_TOKEN: ${{ secrets.DASH0_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  # Pure-bash unit tests for the tools/bazel wrapper. No aspect, no bazel, no
  # pre-build — runs on a stock ephemeral runner in seconds and guards the
  # wrapper's routing/flag-classification logic against regressions.
  wrapper-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: tools/bazel wrapper tests
        run: ./tools/wrapper-test.sh
  pre-build:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      # launcher-install: false — we're about to build the CLI from source
      # via bootstrap.sh; no point installing a launcher we'd immediately
      # shadow. aspect-api-token is also omitted: auth login would run
      # before any `aspect` binary exists.
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
      - name: Pre-build CLI
        run: |
          echo "Build and upload CLI to remote cache"
          .aspect/bootstrap.sh
      # Surface the just-built binary to the ephemeral (GitHub-hosted) jobs
      # below. Those runners are small and don't have remote-cache access yet,
      # so we re-use the binary that the self-hosted runner already built rather
      # than rebuilding from source per ephemeral job.
      - name: Upload aspect-cli binary
        uses: actions/upload-artifact@v7
        with:
          name: aspect-cli
          path: target/ci/aspect-cli
          retention-days: 1
          if-no-files-found: error
  # Kick off ci-workflows-delivery.yaml as its OWN workflow run, immediately
  # after pre-build. We dispatch via the API (rather than a reusable
  # `uses:` call) on purpose: a reusable workflow nests its jobs inside this
  # run, whereas a dispatch produces a separate workflow run in the GitHub UI.
  # That separation is the point — it gives the Aspect PR-summary comment a
  # genuine cross-workflow case to merge tasks from.
  #
  # We dispatch on the PR head ref (or branch for push) so the dispatched run
  # executes *this* commit's delivery workflow, and we hand it `prebuild_run_id`
  # so the delivery jobs reuse the binary pre-build just uploaded instead of
  # rebuilding from source.
  #
  # A workflow_dispatch run carries NO PR context (event_name is
  # workflow_dispatch, not pull_request) — so without help the delivery run is
  # orphaned: it shows no status check on the PR and the Aspect PR-summary
  # comment can't merge its tasks. We pass the triggering PR's number and head
  # SHA through so the delivery run can reconstruct that context:
  #   pr_number -> ASPECT_GITHUB_PR_NUMBER (github.axl detect_pr override)
  #   head_sha  -> GITHUB_SHA              (so the check-run attaches to the PR
  #                                         head commit, not the merge commit)
  # On push (no PR) both resolve to empty and delivery behaves as a branch run.
  dispatch-delivery:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 5
    permissions:
      actions: write # required to dispatch another workflow
      contents: read
    steps:
      - name: Dispatch CI - Delivery
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.head_ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh workflow run ci-workflows-delivery.yaml \
            --repo "${{ github.repository }}" \
            --ref "$REF" \
            --field "force_targets=" \
            --field "prebuild_run_id=${{ github.run_id }}" \
            --field "pr_number=${PR_NUMBER}" \
            --field "head_sha=${HEAD_SHA}"
  # Dedicated buildifier-only step that runs in parallel with format-task.
  # Models the legacy Rosetta `buildifier` task using a Starlark-only
  # `format_multirun` target — see https://aspect.build/docs/cli/migration/buildifier.
  buildifier-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # install-prebuilt-aspect-cli only downloads an artifact and puts a
      # binary on PATH — it doesn't need any environment setup, so it can
      # run before setup-aspect. That order also lets setup-aspect's
      # built-in `aspect auth login` find the prebuilt `aspect` on PATH.
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Buildifier Task
        run: aspect buildifier --task:name buildifier-gha
      - name: Buildifier Task (scope=tracked)
        run: aspect buildifier --scope=tracked --task:name buildifier-gha-tracked
      - name: Buildifier Task (scope=all)
        run: aspect buildifier --scope=all --task:name buildifier-gha-all
  buildifier-debug-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Buildifier Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect buildifier --task:name buildifier-gha-debug
  format-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Format Task
        run: bazel format --task:name format-gha
      - name: Format Task (scope=tracked)
        run: bazel format --scope=tracked --task:name format-gha-tracked
      - name: Format Task (scope=all)
        run: bazel format --scope=all --task:name format-gha-all
  format-debug-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Format Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 bazel format --task:name format-gha-debug
  format-repeat-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      # Test repeat tasks without --task:name flags
      - name: Format Task
        run: bazel format
      - name: Format Task 2
        run: bazel format
      - name: Format Task 3
        run: bazel format
      - name: Format Task 4
        run: bazel format
  gazelle-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle Task
        run: aspect gazelle --task:name gazelle-gha
  gazelle-debug-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect gazelle --task:name gazelle-gha-debug
  gazelle-from-source-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      # Regression test for the build-from-source gazelle path —
      # upstream `gazelle()` macro + rules_go toolchain compiling a
      # bespoke gazelle binary, instead of the prebuilt artifact.
      # `--config=pure_go` is required on Linux: toolchains_llvm_bootstrapped's
      # lld can't accept Go's non-PIC relocations on x86_64.
      - name: Gazelle Task — from-source
        run: aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task:name gazelle-from-source-gha
  gazelle-from-source-debug-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Gazelle Task — from-source (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task:name gazelle-from-source-gha-debug
  lint-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Lint Task
        run: aspect lint --task:name lint-gha
  lint-debug-task:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Lint Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect lint --task:name lint-gha-debug
  build-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Build Task
        run: bazel --aspect:disable_plugins --aspect:lock_version build --task:name build-gha
  build-debug-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Build Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 bazel --aspect:disable_plugins --aspect:lock_version build --task:name build-gha-debug
  test-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test Task
        run: aspect test --task:name test-gha
  test-debug-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect test --task:name test-gha-debug
  # Build/test on an EPHEMERAL GitHub-hosted runner (no Aspect Workflows
  # bb_clientd FUSE mount). Scoped to //examples/... so it's fast. The remote
  # cache is disabled (--remote_cache=) so Bazel keeps outputs local and BES
  # reports `file://` URIs for test.log / action stderr — the path the inline
  # failure snippets resolve without the FUSE mount. A --disk_cache keeps it
  # quick across runs. This is the surface that exercises the non-FUSE snippet
  # path end-to-end; once our multi-tenant remote cache is available on
  # ephemeral runners we can add a bytestream:// variant too.
  #
  # NOTE: while the DO-NOT-LAND commit drops the `manual` tag from
  # //examples/test_states:demo_{test,build}_fail, these jobs go red on purpose
  # and render the inline snippets on this PR's surfaces.
  build-task-ephemeral:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Build Task (ephemeral)
        run: |
          aspect build --task:name build-gha-ephemeral \
            --bazel-flag=--remote_cache= \
            --bazel-flag=--disk_cache="$RUNNER_TEMP/aspect-disk-cache" \
            -- //examples/...
  test-task-ephemeral:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test Task (ephemeral)
        # --keep_going comes from `--config=ci` (injected by .aspect/config.axl on
        # CI), so a build-action failure (demo_build_fail genrule) doesn't abort
        # the test phase — both the failed test (test.log snippet) and the failed
        # action (stderr snippet) surface together.
        run: |
          aspect test --task:name test-gha-ephemeral \
            --bazel-flag=--remote_cache= \
            --bazel-flag=--disk_cache="$RUNNER_TEMP/aspect-disk-cache" \
            -- //examples/...
  # Render each template preset with the freshly-built `aspect init` and build
  # the generated workspace. Catches CLI-side breakage of the init renderer
  # against the live template. `--template-ref=main` tests the current template
  # tip; `init`'s default (latest release) is what end users get.
  #
  # Every preset is scaffolded on PRs (cheap, exercises the renderer for all of
  # them), but the slow workspace build runs only for `shell` — the fastest
  # preset and enough to smoke-test the generated build. Pushes to main build
  # every preset.
  init-preset:
    runs-on: ubuntu-latest
    needs: [pre-build]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        preset:
          - minimal
          - shell
          - go
          - js
          - py
          - java
          - kotlin
          - cpp
          - rust
          - ruby
          - scala
          - kitchen-sink
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          launcher-install: false
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Scaffold preset
        run: |
          aspect init "$RUNNER_TEMP/proj" --task:name init-${{ matrix.preset }} --preset='${{ matrix.preset }}' --name=my_project --template-ref=main
      - name: Build generated workspace
        if: ${{ github.event_name != 'pull_request' || matrix.preset == 'shell' }}
        working-directory: ${{ runner.temp }}/proj
        run: aspect build --task:name init-${{ matrix.preset }} -- //...
  # `aspect cache diff` probes the remote cache with --experimental_remote_require_cached
  # to list the test targets affected by this commit — running nothing. It needs
  # cache access, so (like build/test) it runs on a self-hosted aspect-workflows
  # runner, not an ephemeral one.
  #
  # Baseline = whatever the remote cache already holds (populated by mainline's
  # test-task uploads). We `needs: [pre-build]` (NOT test-task) so the probe reads
  # the pre-PR baseline rather than this run's freshly-uploaded results.
  #
  # The probe forces a fresh remote lookup per action via --nokeep_state_after_build
  # --nouse_action_cache, so it needs no separate or wiped output base.
  cache-diff-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Cache Diff Task
        run: aspect cache diff --task:name cache-diff-gha
  cache-diff-debug-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Cache Diff Task (ASPECT_DEBUG=1)
        run: ASPECT_DEBUG=1 aspect cache diff --task:name cache-diff-gha-debug
  # Workflows runner smoke test: the freshly-built CLI starts, prints version /
  # help, and the runner injects the expected ASPECT_WORKFLOWS_* environment.
  # Runs on a self-hosted runner because the ASPECT_WORKFLOWS_RUNNER_* values it
  # dumps only exist there. Ported from the Buildkite `runner-smoke` step (which
  # only runs on main); kept here so PRs catch CLI-startup / env-plumbing breakage.
  runner-smoke:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Runner smoke test
        run: |
          aspect --version
          aspect version
          aspect help
          echo "ASPECT_* env var names present:"
          env | grep -o '^ASPECT_[^=]*' | sort | sed 's/^/  /'
          echo "ASPECT_WORKFLOWS_* values:"
          for var in \
            ASPECT_WORKFLOWS_BES_BACKEND \
            ASPECT_WORKFLOWS_BES_RESULTS_URL \
            ASPECT_WORKFLOWS_DELIVERY_API_ENDPOINT \
            ASPECT_WORKFLOWS_REMOTE_BYTESTREAM_URI_PREFIX \
            ASPECT_WORKFLOWS_REMOTE_CACHE \
            ASPECT_WORKFLOWS_RUNNER \
            ASPECT_WORKFLOWS_RUNNER_ASPECT_LAUNCHER_VERSION \
            ASPECT_WORKFLOWS_RUNNER_AZ \
            ASPECT_WORKFLOWS_RUNNER_BAZEL_ROOT_DIR \
            ASPECT_WORKFLOWS_RUNNER_BIN_DIR \
            ASPECT_WORKFLOWS_RUNNER_CI_AGENT_VERSION \
            ASPECT_WORKFLOWS_RUNNER_CLOUD_ACCOUNT \
            ASPECT_WORKFLOWS_RUNNER_CLOUD_PROVIDER \
            ASPECT_WORKFLOWS_RUNNER_DATA_DIR \
            ASPECT_WORKFLOWS_RUNNER_HAS_NVME_STORAGE \
            ASPECT_WORKFLOWS_RUNNER_IMAGE_ID \
            ASPECT_WORKFLOWS_RUNNER_INSTANCE_ID \
            ASPECT_WORKFLOWS_RUNNER_INSTANCE_NAME \
            ASPECT_WORKFLOWS_RUNNER_INSTANCE_TYPE \
            ASPECT_WORKFLOWS_RUNNER_GROUP_NAME \
            ASPECT_WORKFLOWS_RUNNER_GROUP_QUEUE \
            ASPECT_WORKFLOWS_RUNNER_JOB_HISTORY_FILE \
            ASPECT_WORKFLOWS_RUNNER_JOB_TMPDIR \
            ASPECT_WORKFLOWS_RUNNER_LAST_HEALTH_CHECK_FILE \
            ASPECT_WORKFLOWS_RUNNER_RESOURCE_TYPE \
            ASPECT_WORKFLOWS_RUNNER_OUTPUT_ROOT_DIR \
            ASPECT_WORKFLOWS_RUNNER_REGION \
            ASPECT_WORKFLOWS_RUNNER_REPOSITORY_CACHE_DIR \
            ASPECT_WORKFLOWS_RUNNER_STORAGE_PATH \
            ASPECT_WORKFLOWS_RUNNER_VERSION \
            ASPECT_WORKFLOWS_RUNNER_WARMING_CACHE_VERSION_FILE \
            ASPECT_WORKFLOWS_RUNNER_WARMING_COMPLETE_MARKER_FILE \
            ASPECT_WORKFLOWS_RUNNER_WARMING_ENABLED \
          ; do
            val=$(printenv "$var") && echo "  $var=$val" || true
          done
  # The AXL suite + the CLI/launcher smoke commands were a single Buildkite
  # `axl-tests` step. On GitHub Actions they are split into two jobs that run in
  # parallel — `axl-tests` (the ~3min `aspect tests axl` suite) and `axl-smoke`
  # (the demo/user/run/dev-snapshot end-to-end checks) — so the smoke commands
  # are no longer serialized behind the test suite. Both jobs build the same
  # dev launcher from THIS commit via the build-dev-launcher composite action;
  # see that action for why the launcher must be built (rather than reused from
  # the prebuilt CLI) and how the host-native binary is probed.
  #
  # `aspect tests axl` asserts (under CI) that it was launched by the just-built,
  # UNSTAMPED launcher: ASPECT_LAUNCHER_VERSION == "0.0.0-dev" and the launcher
  # resolved the CLI via local("target/ci/aspect-cli") (.aspect/axl.axl). The
  # stable `aspect` launcher that setup-aspect / the runner provides is
  # release-stamped, so the dev launcher is built and invoked directly — exactly
  # like Buildkite's `$LAUNCHER`. The composite action exports $LAUNCHER and $CLI
  # into $GITHUB_ENV for the steps below.
  axl-tests:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - uses: ./.github/actions/build-dev-launcher
        with:
          task-name: axl-tests-gha-bootstrap
      - name: AXL Tests
        run: |
          echo "--- aspect tests axl"
          "$LAUNCHER" tests axl
  # CLI/launcher end-to-end smoke. Split from `axl-tests` so it runs in parallel
  # with the AXL suite rather than serialized ahead of it. Builds its own dev
  # launcher (cheap — a remote-cache hit on the pre-built tree).
  axl-smoke:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - uses: ./.github/actions/build-dev-launcher
        with:
          task-name: axl-smoke-gha-bootstrap
      - name: CLI/launcher smoke
        run: |
          echo "--- aspect demo template-demo"
          "$LAUNCHER" demo template-demo
          echo "--- aspect user nested user-task"
          "$LAUNCHER" user nested user-task --run_count 5
          echo "--- aspect user user-task-man"
          "$LAUNCHER" user user-task-man
          echo "--- aspect user user-task-added-by-config"
          "$LAUNCHER" user user-task-added-by-config
          echo "--- aspect user user-task-subdir (in crates/aspect-cli)"
          (
            cd crates/aspect-cli
            "$LAUNCHER" user user-task-subdir
          )
          echo "--- aspect run smoke (//examples/deliverable)"
          "$LAUNCHER" run //examples/deliverable:py_deliverable
          "$LAUNCHER" run //examples/deliverable:sh_deliverable -- forwarded-arg
          echo "--- aspect help"
          "$LAUNCHER" help
          echo "--- aspect-launcher --version"
          "$LAUNCHER" --version
          echo "--- aspect-cli --version"
          "$CLI" --version
          echo "--- aspect version"
          "$LAUNCHER" version
          echo "--- invalid task-id"
          "$LAUNCHER" build --task-id not-a-uuid //... && echo "ERROR: --task-id should reject non-UUID" && exit 1 || true
          echo "--- invalid task-key"
          "$LAUNCHER" build --task:name "bad key!" //... && echo "ERROR: --task:name should reject invalid chars" && exit 1 || true
          echo "--- aspect dev test-template-snapshots"
          "$LAUNCHER" dev test-template-snapshots
          echo "--- aspect dev test-lint-template-snapshots"
          "$LAUNCHER" dev test-lint-template-snapshots
          echo "--- aspect dev test-lint-annotation-plan"
          "$LAUNCHER" dev test-lint-annotation-plan
          echo "--- aspect dev test-format-template-snapshots"
          "$LAUNCHER" dev test-format-template-snapshots
          echo "--- aspect dev test-gazelle-template-snapshots"
          "$LAUNCHER" dev test-gazelle-template-snapshots
          echo "--- aspect dev test-delivery-template-snapshots"
          "$LAUNCHER" dev test-delivery-template-snapshots
          echo "--- aspect dev test-bk-annotation-snapshots"
          "$LAUNCHER" dev test-bk-annotation-snapshots
          echo "--- aspect dev test-pr-comment-snapshots"
          "$LAUNCHER" dev test-pr-comment-snapshots
          echo "--- aspect dev test-github-detect"
          "$LAUNCHER" dev test-github-detect
          echo "--- aspect dev test-gitlab-detect"
          "$LAUNCHER" dev test-gitlab-detect
          echo "--- aspect dev test-gitlab-client"
          "$LAUNCHER" dev test-gitlab-client
          echo "--- aspect dev test-tips"
          "$LAUNCHER" dev test-tips
          echo "--- aspect dev test-rate-limit"
          "$LAUNCHER" dev test-rate-limit
          echo "--- aspect dev test-runner-job-history"
          "$LAUNCHER" dev test-runner-job-history
  # NOTE: the Buildkite `bazelrc-e2e` step is intentionally NOT ported here. It
  # asserts that bare `bazel` and `aspect` start the SAME Bazel server (identical
  # startup flags, no server thrash). On a GitHub Actions Workflows runner `bazel`
  # resolves to the stable Aspect launcher rather than vanilla bazel, so the
  # bare-bazel-vs-aspect comparison the test depends on can't be reconstructed
  # (and the launcher injects BES/remote-cache config that hangs on flush). It
  # stays a Buildkite-only test on main.
  # Smoke-tests the new test-task flags. Ported from the Buildkite
  # `test-flags-task` step. `--target-pattern-file` is forwarded to Bazel
  # verbatim, so the assertion is just that aspect resolves the file and the run
  # completes. `--coverage` is exercised against an sh_test rather than a
  # rust_test: toolchains_llvm_bootstrapped 0.5.2 (pinned in MODULE.bazel) ships
  # without libclang_rt.profile.a, so any rust_test under --collect_code_coverage
  # fails CppLink (upstream hermeticbuild/hermetic-llvm#318, fixed in #468 — not
  # in 0.5.2 yet). sh_test has no coverage instrumentation so this exercises flag
  # plumbing + the "report not found" warning path rather than an LCOV payload.
  test-flags-task:
    runs-on: [self-hosted, aspect-workflows, aspect-default]
    needs: [pre-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-prebuilt-aspect-cli
      - uses: aspect-build/setup-aspect@2306377a61c45954ab2df7c7311698b109364352 # v2026.26.9
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}
      - name: Test Task — new flags
        run: |
          echo "--- aspect test --target-pattern-file"
          PATTERNS=$(mktemp)
          echo "# smoke: targets forwarded via --target_pattern_file" > "$PATTERNS"
          echo "//examples/test_states:always_pass" >> "$PATTERNS"
          aspect test --task:name test-gha-target-pattern-file --target-pattern-file="$PATTERNS"
          rm -f "$PATTERNS"

          echo "--- aspect test --coverage (+ --coverage-report + --coverage-tool)"
          REPORT=$(mktemp)
          aspect test --task:name test-gha-coverage \
            --coverage \
            --coverage-report="$REPORT" \
            --coverage-tool=cat --coverage-tool-arg='{report}' \
            //examples/test_states:always_pass
          rm -f "$REPORT"
