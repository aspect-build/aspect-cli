steps:
  - key: runner-smoke
    label: ":aspect: Workflows Runner Smoke Test"
    agents:
      queue: aspect-default
    command: |
      aspect --version
      aspect version
      aspect help
      echo "ASPECT_* env var names present:"
      env | grep -o '^ASPECT_[^=]*' | sort | sed 's/^/  /'
      echo "ASPECT_WORKFLOWS_* values:"
      for var in \
        ASPECT_WORKFLOWS_BES_BACKEND \
        ASPECT_WORKFLOWS_BES_RESULTS_URL \
        ASPECT_WORKFLOWS_DELIVERY_API_ENDPOINT \
        ASPECT_WORKFLOWS_REMOTE_BYTESTREAM_URI_PREFIX \
        ASPECT_WORKFLOWS_REMOTE_CACHE \
        ASPECT_WORKFLOWS_RUNNER \
        ASPECT_WORKFLOWS_RUNNER_ASPECT_LAUNCHER_VERSION \
        ASPECT_WORKFLOWS_RUNNER_AZ \
        ASPECT_WORKFLOWS_RUNNER_BAZEL_ROOT_DIR \
        ASPECT_WORKFLOWS_RUNNER_BIN_DIR \
        ASPECT_WORKFLOWS_RUNNER_CI_AGENT_VERSION \
        ASPECT_WORKFLOWS_RUNNER_CLOUD_ACCOUNT \
        ASPECT_WORKFLOWS_RUNNER_CLOUD_PROVIDER \
        ASPECT_WORKFLOWS_RUNNER_DATA_DIR \
        ASPECT_WORKFLOWS_RUNNER_HAS_NVME_STORAGE \
        ASPECT_WORKFLOWS_RUNNER_IMAGE_ID \
        ASPECT_WORKFLOWS_RUNNER_INSTANCE_ID \
        ASPECT_WORKFLOWS_RUNNER_INSTANCE_NAME \
        ASPECT_WORKFLOWS_RUNNER_INSTANCE_TYPE \
        ASPECT_WORKFLOWS_RUNNER_GROUP_NAME \
        ASPECT_WORKFLOWS_RUNNER_GROUP_QUEUE \
        ASPECT_WORKFLOWS_RUNNER_JOB_HISTORY_FILE \
        ASPECT_WORKFLOWS_RUNNER_JOB_TMPDIR \
        ASPECT_WORKFLOWS_RUNNER_LAST_HEALTH_CHECK_FILE \
        ASPECT_WORKFLOWS_RUNNER_RESOURCE_TYPE \
        ASPECT_WORKFLOWS_RUNNER_OUTPUT_ROOT_DIR \
        ASPECT_WORKFLOWS_RUNNER_REGION \
        ASPECT_WORKFLOWS_RUNNER_REPOSITORY_CACHE_DIR \
        ASPECT_WORKFLOWS_RUNNER_STORAGE_PATH \
        ASPECT_WORKFLOWS_RUNNER_VERSION \
        ASPECT_WORKFLOWS_RUNNER_WARMING_CACHE_VERSION_FILE \
        ASPECT_WORKFLOWS_RUNNER_WARMING_COMPLETE_MARKER_FILE \
        ASPECT_WORKFLOWS_RUNNER_WARMING_ENABLED \
      ; do
        val=$$(printenv "$$var") && echo "  $$var=$$val" || true
      done

  - key: pre-build
    label: ":aspect: Pre-build CLI"
    agents:
      queue: aspect-huge
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: echo ".buildkite/hooks/pre-command builds and uploads CLI to remote cache"

  - key: axl-tests
    depends_on:
      - pre-build
    label: ":aspect: AXL Tests"
    agents:
      queue: aspect-huge
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      echo "--- :bazel: aspect build //crates/aspect-launcher //crates/aspect-cli"
      ASPECT_DEBUG=1 aspect build --task-key build-bk-axl-tests-bootstrap //crates/aspect-launcher //crates/aspect-cli
      # Use cquery to get the actual output paths (handles platform transitions on Linux)
      WORKSPACE_ROOT=$$(pwd)
      LAUNCHER=$$WORKSPACE_ROOT/$$(bazel $$BAZEL_STARTUP_OPTS cquery $$BAZEL_BUILD_OPTS --output=files //crates/aspect-launcher)
      CLI=$$WORKSPACE_ROOT/$$(bazel $$BAZEL_STARTUP_OPTS cquery $$BAZEL_BUILD_OPTS --output=files //crates/aspect-cli)
      echo "--- :aspect: aspect demo template-demo"
      $$LAUNCHER demo template-demo
      echo "--- :aspect: aspect user nested user=task"
      $$LAUNCHER user nested user-task --run_count 5
      # TODO: broken fix this.
      # echo "--- :aspect: aspect user nested user-task-reexport"
      # $$LAUNCHER user nested user-task-reexport
      echo "--- :aspect: aspect user user-task-man"
      $$LAUNCHER user user-task-man
      echo "--- :aspect: aspect user user-task-added-by-config"
      $$LAUNCHER user user-task-added-by-config
      echo "--- :aspect: aspect user user-task-subdir (in crates/aspect-cli)"
      (
        cd crates/aspect-cli
        $$LAUNCHER user user-task-subdir
      )
      echo "--- :aspect: aspect help"
      $$LAUNCHER help
      echo "--- :aspect: aspect-launcher --version"
      $$LAUNCHER --version
      echo "--- :aspect: aspect-cli --version"
      $$CLI --version
      echo "--- :aspect: aspect version"
      $$LAUNCHER version
      echo "--- :aspect: invalid task-id"
      $$LAUNCHER build --task-id not-a-uuid //... && echo "ERROR: --task-id should reject non-UUID" && exit 1 || true
      echo "--- :aspect: invalid task-key"
      $$LAUNCHER build --task-key "bad key!" //... && echo "ERROR: --task-key should reject invalid chars" && exit 1 || true
      echo "--- :aspect: aspect tests axl"
      # Run AXL tests last — cancel tests may kill the Bazel server,
      # which invalidates bazel-out paths used by $$LAUNCHER above.
      $$LAUNCHER tests axl

  - key: bazelrc-e2e
    depends_on:
      - pre-build
    label: ":bazel: bazelrc e2e (no server restart)"
    agents:
      queue: aspect-default
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      echo "--- :bazel: Warm up Bazel server"
      bazel $$BAZEL_STARTUP_OPTS test $$BAZEL_BUILD_OPTS -c dbg //crates/bazelrc:bazelrc_test
      OUTPUT_BASE=$$(bazel $$BAZEL_STARTUP_OPTS info output_base)
      SERVER_LOG=$$(bazel $$BAZEL_STARTUP_OPTS info server_log)
      BEFORE_PID=$$(bazel $$BAZEL_STARTUP_OPTS info server_pid)
      echo "output_base: $$OUTPUT_BASE"
      echo "server_log:  $$SERVER_LOG"
      echo "server_pid:  $$BEFORE_PID"
      echo "--- :bazel: bazel info (before aspect)"
      bazel $$BAZEL_STARTUP_OPTS info
      echo "--- :aspect: aspect test //crates/bazelrc:bazelrc_test"
      aspect test --task-key build-bk-bazelrc-e2e //crates/bazelrc:bazelrc_test
      AFTER_PID=$$(bazel $$BAZEL_STARTUP_OPTS info server_pid)
      echo "--- :bazel: bazel info (after aspect)"
      bazel $$BAZEL_STARTUP_OPTS info
      # Intentionally no $$SERVER_LOG cat or $$OUTPUT_BASE artifact uploads.
      # This repo is public, so the Buildkite job log and artifact tab are
      # world-readable. java.log / command.log / jvm.out / cmdline can capture
      # `--announce_rc` output and error messages that quote flag values
      # verbatim (--remote_header=, --action_env=TOKEN=, URL creds …) — none
      # of which go through the Rust BES redactor.
      if [ "$$BEFORE_PID" != "$$AFTER_PID" ]; then
        echo "^^^ +++"
        echo "ERROR: Bazel server was restarted (PID $$BEFORE_PID → $$AFTER_PID)"
        echo "This means aspect produced different startup flags than bazel."
        exit 1
      fi
      echo "OK: server PID unchanged ($$BEFORE_PID)"

  # Dedicated buildifier-only step that runs in parallel with format-task.
  # Models the legacy Rosetta `buildifier` task using a Starlark-only
  # `format_multirun` target — see https://docs.aspect.build/cli/migration/buildifier
  - key: buildifier-task
    label: ":aspect: Buildifier Task"
    depends_on:
      - pre-build
    agents:
      queue: aspect-default
    timeout_in_minutes: 20
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      ASPECT_DEBUG=1 aspect format --task-key buildifier-bk-debug --formatter-target=//tools/format:format-starlark
      aspect format --task-key buildifier-bk --formatter-target=//tools/format:format-starlark

  - key: format-task
    label: ":aspect: Format Task"
    depends_on:
      - pre-build
    agents:
      queue: aspect-default
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    # Starlark patterns are handled by buildifier-task; ignore them here so
    # the two steps don't do duplicate work.
    command: |
      ASPECT_DEBUG=1 aspect format --task-key format-bk-debug \
        --ignore-pattern='**/*.axl' \
        --ignore-pattern='**/*.bzl' \
        --ignore-pattern='**/BUILD' \
        --ignore-pattern='**/BUILD.bazel' \
        --ignore-pattern='**/MODULE.bazel' \
        --ignore-pattern='**/WORKSPACE' \
        --ignore-pattern='**/WORKSPACE.bazel'
      aspect format --task-key format-bk \
        --ignore-pattern='**/*.axl' \
        --ignore-pattern='**/*.bzl' \
        --ignore-pattern='**/BUILD' \
        --ignore-pattern='**/BUILD.bazel' \
        --ignore-pattern='**/MODULE.bazel' \
        --ignore-pattern='**/WORKSPACE' \
        --ignore-pattern='**/WORKSPACE.bazel'

  - key: gazelle-task
    label: ":aspect: Gazelle Task"
    depends_on:
      - pre-build
    agents:
      queue: aspect-default
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      ASPECT_DEBUG=1 aspect gazelle --check --task-key gazelle-bk-debug
      aspect gazelle --check --task-key gazelle-bk

  - key: gazelle-from-source-task
    label: ":aspect: Gazelle Task (from-source)"
    depends_on:
      - pre-build
    agents:
      queue: aspect-default
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      # Regression test for the build-from-source gazelle path
      # (upstream `gazelle()` macro + rules_go toolchain) — same task
      # logic, alternate target. Most users will adopt the prebuilt
      # binary; this job exists so we catch breakage in the
      # build-from-source path.
      #
      # `--config=pure_go` is required on Linux: toolchains_llvm_bootstrapped's
      # lld can't accept Go's non-PIC relocations on x86_64. Pure Go skips the
      # cc-toolchain link step entirely. See .bazelrc for the config definition.
      ASPECT_DEBUG=1 aspect gazelle --check --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-bk-debug
      aspect gazelle --check --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-bk

  - key: build-task
    depends_on:
      - pre-build
    label: ":aspect: Build Task"
    agents:
      queue: aspect-default
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      ASPECT_DEBUG=1 aspect build --task-key build-bk-debug -- //... -//exclude/...
      aspect build --task-key build-bk -- //... -//exclude/...

  - key: test-task
    depends_on:
      - pre-build
    label: ":aspect: Test Task"
    agents:
      queue: aspect-default
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      ASPECT_DEBUG=1 aspect test --task-key test-bk-debug -- //... -//exclude/...
      aspect test --task-key test-bk -- //... -//exclude/...

  - key: lint-task
    depends_on:
      - pre-build
    label: ":aspect: Lint Task"
    agents:
      queue: aspect-default
    timeout_in_minutes: 20
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      ASPECT_DEBUG=1 aspect lint --task-key lint-bk-debug --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...
      # Revert applied --fix edits before next run. Use git restore (tracked
      # mods only) + git clean -fd (untracked non-ignored files); do NOT use
      # -x because that wipes bazel-out/ and target/ — including the
      # pre-built CLI dropped there by .aspect/bootstrap.sh.
      git restore .
      git clean -fd
      aspect lint --task-key lint-bk --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...

  # Manual break-glass input — only shown on UI-triggered builds. Users
  # can fill this to force-deliver specific targets without editing the
  # pipeline. The delivery step reads it via meta-data and pipes the value
  # into ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS. Non-UI builds skip the
  # input entirely so webhook/PR builds aren't blocked.
  - key: force-targets-input
    if: build.source == "ui"
    input: ":package: Delivery: force-target overrides (optional)"
    fields:
      - text: FORCE_TARGETS
        hint: "Space-separated Bazel labels to force-deliver. Example: //examples/deliverable. Leave empty for normal selective delivery."
        required: false
        default: ""
        key: force_targets
        # Validate the input against Bazel's label grammar so a typo
        # is caught at job-trigger time rather than during the build.
        # Allows whitespace (including empty), one or more labels, and
        # the full label syntax — repository, package path, and target name.
        format: ^\s*$|^\s*(?:([@]{1,2}[\w.~-]*|[@]{0})\/\/(?:[\w.@-]+\/)*[\w.@-]*(?::(?:[\w\[\]!%@^"#\$&'()*+,;<=>?{|}~.-]+\/)*[\w\[\]!%@^"#\$&'()*+,;<=>?{|}~.-]*)?(?!\/)(?:\s+)?)+\s*$

  - key: delivery-task
    label: ":package: Delivery Task"
    depends_on:
      - pre-build
      # Per-dep allow_failure so a skipped input on non-UI builds doesn't
      # bypass pre-build failures.
      - step: force-targets-input
        allow_failure: true
    agents:
      queue: aspect-default
    timeout_in_minutes: 10
    retry:
      automatic:
        - exit_status: 78 # unhealthy signal from .buildkite/hooks/pre-command
          limit: 1
    command: |
      export ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS=$$(buildkite-agent meta-data get force_targets --default '')
      ASPECT_DEBUG=1 aspect delivery --task-key delivery-bk-debug //examples/deliverable
      aspect delivery --task-key delivery-bk //examples/deliverable
