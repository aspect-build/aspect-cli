version: 2.1

workflows:
  aspect-workflows:
    jobs:
      - pre-build
      - build-task:
          requires: [pre-build]
      - test-task:
          requires: [pre-build]
      - delivery-task:
          requires: [pre-build]

jobs:
  pre-build:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Pre-build CLI
          command: |
            echo "Build and upload CLI to remote cache"
            .aspect/bootstrap.sh

  build-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Build Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect build --task-key build-cci-debug //...
      - run:
          name: Build Task
          command: aspect build --task-key build-cci //...

  test-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Test Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect test --task-key test-cci-debug //...
      - run:
          name: Test Task
          command: aspect test --task-key test-cci //...

  delivery-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Delivery Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect delivery --task-key delivery-cci-debug --build-url $CIRCLE_BUILD_URL --commit-sha $CIRCLE_SHA1 //examples/deliverable
      - run:
          name: Delivery Task
          command: aspect delivery --task-key delivery-cci --build-url $CIRCLE_BUILD_URL --commit-sha $CIRCLE_SHA1 //examples/deliverable
