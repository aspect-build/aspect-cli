version: 2.1
orbs:
  setup-aspect: aspect-build/setup-aspect@2026.26.10
# Manual break-glass override for `aspect delivery`. Settable via the
# CircleCI "Trigger Pipeline" UI or API; default empty means normal
# selective delivery on every other build.
parameters:
  force_targets:
    type: string
    default: ""
    description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
workflows:
  ci:
    jobs:
      - pre-build
      - build-task:
          requires: [pre-build]
      - test-task:
          requires: [pre-build]
      - lint-task:
          requires: [pre-build]
      - buildifier-task:
          requires: [pre-build]
      - format-task:
          requires: [pre-build]
      - gazelle-task:
          requires: [pre-build]
      - gazelle-from-source-task:
          requires: [pre-build]
      - delivery-task:
          requires: [pre-build]
jobs:
  pre-build:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Pre-build CLI
          command: |
            echo "Build and upload CLI to remote cache"
            .aspect/bootstrap.sh
  build-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - setup-aspect/setup
      - run:
          name: Build Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect build --task:name build-cci-debug
      - run:
          name: Build Task
          command: aspect build --task:name build-cci
  test-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - setup-aspect/setup
      - run:
          name: Test Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect test --task:name test-cci-debug
      - run:
          name: Test Task
          command: aspect test --task:name test-cci
  lint-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - setup-aspect/setup
      - run:
          name: Lint Task (ASPECT_DEBUG=1)
          command: |
            ASPECT_DEBUG=1 aspect lint --task:name lint-cci-debug --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...
            # Revert applied --fix edits before next run. Use git restore (tracked
            # mods only) + git clean -fd (untracked non-ignored files); do NOT use
            # -x because that wipes bazel-out/ and target/ — including the
            # pre-built CLI dropped there by .aspect/bootstrap.sh.
            git restore .
            git clean -fd
      - run:
          name: Lint Task
          command: aspect lint --task:name lint-cci --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...
  # Dedicated buildifier-only step that runs in parallel with format-task.
  # Models the legacy Rosetta `buildifier` task using a Starlark-only
  # `format_multirun` target — see https://aspect.build/docs/cli/migration/buildifier
  buildifier-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - setup-aspect/setup
      - run:
          name: Buildifier Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect buildifier --task:name buildifier-cci-debug
      - run:
          name: Buildifier Task
          command: aspect buildifier --task-key buildifier-cci
      - run:
          name: Buildifier Task (scope=tracked, ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect buildifier --scope=tracked --task-key buildifier-cci-tracked-debug
      - run:
          name: Buildifier Task (scope=tracked)
          command: aspect buildifier --scope=tracked --task-key buildifier-cci-tracked
      - run:
          name: Buildifier Task (scope=all, ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect buildifier --scope=all --task-key buildifier-cci-all-debug
      - run:
          name: Buildifier Task (scope=all)
          command: aspect buildifier --scope=all --task-key buildifier-cci-all

  format-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - setup-aspect/setup
      # Starlark patterns are handled by buildifier-task; ignore them here so
      # the two steps don't do duplicate work.
      - run:
          name: Format Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect format --task:name format-cci-debug
      - run:
          name: Format Task
          command: aspect format --task-key format-cci
      - run:
          name: Format Task (scope=tracked, ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect format --scope=tracked --task-key format-cci-tracked-debug
      - run:
          name: Format Task (scope=tracked)
          command: aspect format --scope=tracked --task-key format-cci-tracked
      - run:
          name: Format Task (scope=all, ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect format --scope=all --task-key format-cci-all-debug
      - run:
          name: Format Task (scope=all)
          command: aspect format --scope=all --task-key format-cci-all

  gazelle-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - setup-aspect/setup
      - run:
          name: Gazelle Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect gazelle --task:name gazelle-cci-debug
      - run:
          name: Gazelle Task
          command: aspect gazelle --task:name gazelle-cci
  # Regression test for the build-from-source gazelle path — upstream
  # `gazelle()` macro + rules_go toolchain. Most users will adopt the
  # prebuilt binary; this job catches breakage on the alternate path.
  gazelle-from-source-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - setup-aspect/setup
      # `--config=pure_go` is required on Linux: toolchains_llvm_bootstrapped's
      # lld can't accept Go's non-PIC relocations on x86_64. See .bazelrc.
      - run:
          name: Gazelle Task — from-source (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task:name gazelle-from-source-cci-debug
      - run:
          name: Gazelle Task — from-source
          command: aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task:name gazelle-from-source-cci
  delivery-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    environment:
      ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS: << pipeline.parameters.force_targets >>
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - setup-aspect/setup
      - run:
          name: Delivery Task (ASPECT_DEBUG=1)
          # --warn-unresolved-digest: the deliverable set includes py_deliverable,
          # a stamped py_binary whose PyWriteBuildData action is uncacheable and
          # never resolves a digest — a known, tolerated missing digest, so keep
          # it a warning rather than the (new) default hard failure.
          command: ASPECT_DEBUG=1 aspect delivery --task:name delivery-cci-debug --warn-unresolved-digest
      - run:
          name: Delivery Task
          command: aspect delivery --task:name delivery-cci --warn-unresolved-digest
