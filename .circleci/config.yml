version: 2.1

# Manual break-glass override for `aspect delivery`. Settable via the
# CircleCI "Trigger Pipeline" UI or API; default empty means normal
# selective delivery on every other build.
parameters:
  force_targets:
    type: string
    default: ""
    description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
  run_output_api_probe:
    type: boolean
    default: false
    description: "Experimental: when true, run ONLY the output-api-probe workflow (direct/no-agent test-results API check). Leave false for normal CI."

workflows:
  ci:
    # Normal CI. Skipped when a pipeline is triggered solely to run the
    # experimental probe (see the output-api-probe workflow below).
    when:
      not: << pipeline.parameters.run_output_api_probe >>
    jobs:
      - pre-build
      - build-task:
          requires: [pre-build]
      - test-task:
          requires: [pre-build]
      - lint-task:
          requires: [pre-build]
      - buildifier-task:
          requires: [pre-build]
      - format-task:
          requires: [pre-build]
      - gazelle-task:
          requires: [pre-build]
      - gazelle-from-source-task:
          requires: [pre-build]
      - delivery-task:
          requires: [pre-build]

  # On-demand only: trigger a pipeline with run_output_api_probe=true
  # (CircleCI "Trigger Pipeline" UI/API) to run just this probe. It never
  # runs on — or reddens — normal CI. Verifies the direct (agent-free)
  # test-results output API reverse-engineered from circleci-agent. See
  # .circleci/output_api_probe.sh.
  output-api-probe:
    when: << pipeline.parameters.run_output_api_probe >>
    jobs:
      - output-api-probe

jobs:
  # Hits the real CircleCI runner output API the same way lib/circleci.axl
  # already uploads artifacts (token from /tmp/circleci-ts.sock), but for the
  # test-results endpoints. See .circleci/output_api_probe.sh for the protocol.
  output-api-probe:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Probe runner output API (test-results, direct/no-agent)
          command: bash .circleci/output_api_probe.sh

  pre-build:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Pre-build CLI
          command: |
            echo "Build and upload CLI to remote cache"
            .aspect/bootstrap.sh

  build-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Build Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect build --task-key build-cci-debug
      - run:
          name: Build Task
          command: aspect build --task-key build-cci

  test-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Test Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect test --task-key test-cci-debug
      - run:
          name: Test Task
          command: aspect test --task-key test-cci

  lint-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Lint Task (ASPECT_DEBUG=1)
          command: |
            ASPECT_DEBUG=1 aspect lint --task-key lint-cci-debug --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...
            # Revert applied --fix edits before next run. Use git restore (tracked
            # mods only) + git clean -fd (untracked non-ignored files); do NOT use
            # -x because that wipes bazel-out/ and target/ — including the
            # pre-built CLI dropped there by .aspect/bootstrap.sh.
            git restore .
            git clean -fd
      - run:
          name: Lint Task
          command: aspect lint --task-key lint-cci --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...

  # Dedicated buildifier-only step that runs in parallel with format-task.
  # Models the legacy Rosetta `buildifier` task using a Starlark-only
  # `format_multirun` target — see https://docs.aspect.build/cli/migration/buildifier
  buildifier-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Buildifier Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect buildifier --task-key buildifier-cci-debug
      - run:
          name: Buildifier Task
          command: aspect buildifier --task-key buildifier-cci

  format-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      # Starlark patterns are handled by buildifier-task; ignore them here so
      # the two steps don't do duplicate work.
      - run:
          name: Format Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect format --task-key format-cci-debug
      - run:
          name: Format Task
          command: aspect format --task-key format-cci

  gazelle-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Gazelle Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect gazelle --task-key gazelle-cci-debug
      - run:
          name: Gazelle Task
          command: aspect gazelle --task-key gazelle-cci

  # Regression test for the build-from-source gazelle path — upstream
  # `gazelle()` macro + rules_go toolchain. Most users will adopt the
  # prebuilt binary; this job catches breakage on the alternate path.
  gazelle-from-source-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      # `--config=pure_go` is required on Linux: toolchains_llvm_bootstrapped's
      # lld can't accept Go's non-PIC relocations on x86_64. See .bazelrc.
      - run:
          name: Gazelle Task — from-source (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-cci-debug
      - run:
          name: Gazelle Task — from-source
          command: aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-cci

  delivery-task:
    machine: true
    resource_class: aspect-build/aspect-default
    working_directory: /mnt/ephemeral/workdir
    environment:
      ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS: << pipeline.parameters.force_targets >>
    steps:
      - checkout
      - run:
          name: Bootstrap
          command: .aspect/bootstrap.sh
      - run:
          name: Delivery Task (ASPECT_DEBUG=1)
          command: ASPECT_DEBUG=1 aspect delivery --task-key delivery-cci-debug
      - run:
          name: Delivery Task
          command: aspect delivery --task-key delivery-cci
