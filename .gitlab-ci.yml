workflow:
  rules:
    # Run for everything except tag pushes
    - if: "$CI_COMMIT_TAG == null"

variables:
  # Mirrored setup: the repo lives on GitHub and is mirrored to GitLab for CI.
  # One URL drives both status-check posting (GithubStatusChecks picks the
  # right owner/repo from it) and status-check rendering (build_metadata
  # derives REPO_URL / REPO_OWNER / REPO_NAME / VCS from it).
  ASPECT_VCS_URL: "https://github.com/aspect-build/aspect-cli"
  # Manual break-glass override for `aspect delivery`. Default empty —
  # appears as an editable field on the "Run pipeline" page so users can
  # force-deliver specific targets without editing the pipeline.
  FORCE_TARGETS:
    value: ""
    description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."

stages:
  - CI

pre-build:
  stage: CI
  script:
    - echo "Build and upload CLI to remote cache"
    - .aspect/bootstrap.sh
  tags:
    - aspect-workflows
    - aspect-default

build-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect build --task-key build-gl-debug -- //... -//exclude/...
    - aspect build --task-key build-gl -- //... -//exclude/...

test-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect test --task-key test-gl-debug -- //... -//exclude/...
    - aspect test --task-key test-gl -- //... -//exclude/...

lint-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect lint --task-key lint-gl-debug --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...
    # Revert applied --fix edits before next run. Use git restore (tracked
    # mods only) + git clean -fd (untracked non-ignored files); do NOT use
    # -x because that wipes bazel-out/ and target/ — including the
    # pre-built CLI dropped there by .aspect/bootstrap.sh.
    - git restore .
    - git clean -fd
    - aspect lint --task-key lint-gl --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...

# Dedicated buildifier-only step that runs in parallel with format-task.
# Models the legacy Rosetta `buildifier` task using a Starlark-only
# `format_multirun` target — see https://docs.aspect.build/cli/migration/buildifier.
buildifier-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect format --task-key buildifier-gl-debug --formatter-target=//tools/format:format-starlark
    - aspect format --task-key buildifier-gl --formatter-target=//tools/format:format-starlark

format-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  # Starlark patterns are handled by buildifier-task; ignore them here so the
  # two steps don't do duplicate work.
  script:
    - .aspect/bootstrap.sh
    - |
      ASPECT_DEBUG=1 aspect format --task-key format-gl-debug \
        --ignore-pattern='**/*.axl' \
        --ignore-pattern='**/*.bzl' \
        --ignore-pattern='**/BUILD' \
        --ignore-pattern='**/BUILD.bazel' \
        --ignore-pattern='**/MODULE.bazel' \
        --ignore-pattern='**/WORKSPACE' \
        --ignore-pattern='**/WORKSPACE.bazel'
    - |
      aspect format --task-key format-gl \
        --ignore-pattern='**/*.axl' \
        --ignore-pattern='**/*.bzl' \
        --ignore-pattern='**/BUILD' \
        --ignore-pattern='**/BUILD.bazel' \
        --ignore-pattern='**/MODULE.bazel' \
        --ignore-pattern='**/WORKSPACE' \
        --ignore-pattern='**/WORKSPACE.bazel'

gazelle-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect gazelle --task-key gazelle-gl-debug
    - aspect gazelle --task-key gazelle-gl

# Regression test for the build-from-source gazelle path — upstream
# `gazelle()` macro + rules_go toolchain. Most users will adopt the
# prebuilt binary; this job catches breakage on the alternate path.
# `--config=pure_go` is required on Linux: toolchains_llvm_bootstrapped's
# lld can't accept Go's non-PIC relocations on x86_64.
gazelle-from-source-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-gl-debug
    - aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task-key gazelle-from-source-gl

delivery-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  variables:
    ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS: $FORCE_TARGETS
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect delivery --task-key delivery-gl-debug //examples/deliverable
    - aspect delivery --task-key delivery-gl //examples/deliverable
