workflow:
  rules:
    # Run for everything except tag pushes
    - if: "$CI_COMMIT_TAG == null"

stages:
  - Aspect Workflows

pre-build:
  stage: Aspect Workflows
  script:
    - echo "Build and upload CLI to remote cache"
    - .aspect/bootstrap.sh
  tags:
    - aspect-workflows
    - aspect-default

build-task:
  stage: Aspect Workflows
  needs: [pre-build]
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect build //:cli
    - ASPECT_DEBUG=1 aspect build //...
  tags:
    - aspect-workflows
    - aspect-default

test-task:
  stage: Aspect Workflows
  needs: [pre-build]
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect build //:cli
    - ASPECT_DEBUG=1 aspect test //...
  tags:
    - aspect-workflows
    - aspect-default

delivery-task:
  stage: Aspect Workflows
  needs: [pre-build]
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect build //:cli
    - ASPECT_DEBUG=1 aspect delivery --build_url $CI_PIPELINE_URL --commit_sha $CI_COMMIT_SHA --force_target //:hello -- //:hello //:hello2
  tags:
    - aspect-workflows
    - aspect-default
