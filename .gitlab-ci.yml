include:
  - component: $CI_SERVER_FQDN/aspect-build/setup-aspect-gitlab-component/setup@2026.26.8
workflow:
  rules:
    # Run for everything except tag pushes
    - if: "$CI_COMMIT_TAG == null"
variables:
  # Mirrored setup: the repo lives on GitHub and is mirrored to GitLab for CI.
  # One URL drives both status-check posting (GithubStatusChecks picks the
  # right owner/repo from it) and status-check rendering (build_metadata
  # derives REPO_URL / REPO_OWNER / REPO_NAME / VCS from it).
  ASPECT_VCS_URL: "https://github.com/aspect-build/aspect-cli"
  # Manual break-glass override for `aspect delivery`. Default empty —
  # appears as an editable field on the "Run pipeline" page so users can
  # force-deliver specific targets without editing the pipeline.
  FORCE_TARGETS:
    value: ""
    description: "Bazel targets to force-deliver (space-separated). Example: //examples/deliverable. Leave empty for normal selective delivery."
stages:
  - CI
pre-build:
  stage: CI
  script:
    - echo "Build and upload CLI to remote cache"
    - .aspect/bootstrap.sh
  tags:
    - aspect-workflows
    - aspect-default
build-task:
  stage: CI
  needs: [pre-build]
  extends: .setup-aspect
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect build --task:name build-gl-debug
    - aspect build --task:name build-gl
test-task:
  stage: CI
  needs: [pre-build]
  extends: .setup-aspect
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect test --task:name test-gl-debug
    - aspect test --task:name test-gl
lint-task:
  stage: CI
  needs: [pre-build]
  extends: .setup-aspect
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect lint --task:name lint-gl-debug --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...
    # Revert applied --fix edits before next run. Use git restore (tracked
    # mods only) + git clean -fd (untracked non-ignored files); do NOT use
    # -x because that wipes bazel-out/ and target/ — including the
    # pre-built CLI dropped there by .aspect/bootstrap.sh.
    - git restore .
    - git clean -fd
    - aspect lint --task:name lint-gl --fix --aspect=//tools/lint:linters.bzl%shellcheck -- //examples/lint/... -//exclude/...
# Dedicated buildifier-only step that runs in parallel with format-task.
buildifier-task:
  stage: CI
  needs: [pre-build]
  extends: .setup-aspect
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect buildifier --task:name buildifier-gl-debug
    - aspect buildifier --task:name buildifier-gl
format-task:
  stage: CI
  needs: [pre-build]
  extends: .setup-aspect
  tags:
    - aspect-workflows
    - aspect-default
  # Starlark patterns are handled by buildifier-task; ignore them here so the
  # two steps don't do duplicate work.
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect format --task:name format-gl-debug
    - aspect format --task:name format-gl
gazelle-task:
  stage: CI
  needs: [pre-build]
  extends: .setup-aspect
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect gazelle --task:name gazelle-gl-debug
    - aspect gazelle --task:name gazelle-gl
# Regression test for the build-from-source gazelle path — upstream
# `gazelle()` macro + rules_go toolchain. Most users will adopt the
# prebuilt binary; this job catches breakage on the alternate path.
# `--config=pure_go` is required on Linux: toolchains_llvm_bootstrapped's
# lld can't accept Go's non-PIC relocations on x86_64.
gazelle-from-source-task:
  stage: CI
  needs: [pre-build]
  extends: .setup-aspect
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task:name gazelle-from-source-gl-debug
    - aspect gazelle --gazelle-target=//tools/gazelle:gazelle_from_source --bazel-flag=--config=pure_go --task:name gazelle-from-source-gl
delivery-task:
  stage: CI
  needs: [pre-build]
  extends: .setup-aspect
  tags:
    - aspect-workflows
    - aspect-default
  variables:
    ASPECT_WORKFLOWS_DELIVERY_FORCE_TARGETS: $FORCE_TARGETS
  script:
    - .aspect/bootstrap.sh
    # --local-hash-fallback: the deliverable set includes no_remote_exec_deliverable,
    # a deterministic target tagged no-remote-exec that is not in the remote cache;
    # the flag hashes it locally so it delivers. The first delivery-gl run delivers
    # it via the local hash; the repeated delivery-gl run (same commit, same
    # --task:name, so it hits the recorded state) must SKIP it, proving digest
    # stability + change-detection continuity end-to-end. delivery-gl-debug is the
    # ASPECT_DEBUG variant under its own state prefix.
    # --warn-unresolved-digest: still covers py_deliverable's volatile stamped action.
    - ASPECT_DEBUG=1 aspect delivery --task:name delivery-gl-debug --local-hash-fallback --warn-unresolved-digest
    - aspect delivery --task:name delivery-gl --local-hash-fallback --warn-unresolved-digest
    - aspect delivery --task:name delivery-gl --local-hash-fallback --warn-unresolved-digest
