workflow:
  rules:
    # Run for everything except tag pushes
    - if: "$CI_COMMIT_TAG == null"

variables:
  # Mirrored setup: the repo lives on GitHub and is mirrored to GitLab for CI.
  # One URL drives both status-check posting (GithubStatusChecks picks the
  # right owner/repo from it) and status-check rendering (build_metadata
  # derives REPO_URL / REPO_OWNER / REPO_NAME / VCS from it).
  ASPECT_VCS_URL: "https://github.com/aspect-build/aspect-cli"

stages:
  - CI

pre-build:
  stage: CI
  script:
    - echo "Build and upload CLI to remote cache"
    - .aspect/bootstrap.sh
  tags:
    - aspect-workflows
    - aspect-default

build-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect build --task-key build-gl-debug //...
    - aspect build --task-key build-gl //...

test-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect test --task-key test-gl-debug //...
    - aspect test --task-key test-gl //...

delivery-task:
  stage: CI
  needs: [pre-build]
  tags:
    - aspect-workflows
    - aspect-default
  script:
    - .aspect/bootstrap.sh
    - ASPECT_DEBUG=1 aspect delivery --task-key delivery-gl-debug --build-url $CI_PIPELINE_URL --commit-sha $CI_COMMIT_SHA //examples/deliverable
    - aspect delivery --task-key delivery-gl --build-url $CI_PIPELINE_URL --commit-sha $CI_COMMIT_SHA //examples/deliverable
